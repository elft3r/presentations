<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Deploying Secure Landing Zones in highly regulated sectors</title>

    <link rel="stylesheet" href="dist/reset.css" />
    <link rel="stylesheet" href="dist/reveal.css" />
    <link rel="stylesheet" href="dist/theme/white_contrast_compact_verbatim_headers.css" />
    <link rel="stylesheet" href="dist/theme/utilities.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Theme used for syntax highlighted code -->
    <link rel="stylesheet" href="plugin/highlight/monokai.css" />
  </head>
  <body>
    <div class="reveal">
      <div class="slides text-4xl">
        <section data-external="sections/header.html"></section>
        <section data-external="sections/jochen.html"></section>
        <section data-external="sections/landing-zone.html"></section>
        <section data-external="sections/legal.html"></section>
        <section data-external="sections/multi-account.html"></section>
        <section data-external="sections/account-vending.html"></section>
        <section data-external="sections/security.html"></section>
        <section data-external="sections/learnings.html"></section>
        <section class="section-title"><h1>Q&A</h1></section>
      </div>
    </div>

    <script src="dist/reveal.js"></script>
    <script src="plugin/notes/notes.js"></script>
    <script src="plugin/markdown/markdown.js"></script>
    <script src="plugin/highlight/highlight.js"></script>
    <script>
      // More info about initialization & config:
      // - https://revealjs.com/initialization/
      // - https://revealjs.com/config/
      var isMobile =
        new URLSearchParams(window.location.search).has("mobile");

      Reveal.initialize({
        hash: true,
        slideNumber: "h/v",
        width: isMobile ? 540 : 960,
        height: isMobile ? 960 : 700,

        // Learn about plugins: https://revealjs.com/plugins/
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
        dependencies: [
          {
            src: "plugin/external/external.js",
            condition: function () {
              return !!document.querySelector(
                "[data-external],[data-external-replace]"
              );
            },
          },
        ],
      });
    </script>
  </body>
</html>
