<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Docker Training - BFH</title>

    <link rel="stylesheet" href="dist/reset.css" />
    <link rel="stylesheet" href="dist/reveal.css" />
    <link rel="stylesheet" href="dist/theme/white_contrast_compact_verbatim_headers.css" />
    <link rel="stylesheet" href="dist/theme/utilities.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Theme used for syntax highlighted code -->
    <link rel="stylesheet" href="plugin/highlight/monokai.css" />
  </head>
  <body>
    <div class="reveal">
      <div class="slides text-4xl">
        <section data-external="sections/header.html"></section>
        <section data-external="sections/jochen.html"></section>
        <section data-external="sections/introduction.html"></section>
        <section data-external="sections/why-docker.html"></section>
        <section data-external="sections/cloud-native.html"></section>
        <section data-external="sections/containers-vs-vms.html"></section>
        <section data-external="sections/container-history.html"></section>
        <section data-external="sections/docker-labs.html"></section>
        <section data-external="sections/docker-desktop.html"></section>
        <section data-external="sections/docker-commands.html"></section>
        <section data-external="sections/docker-time.html"></section>
        <section data-external="sections/docker-images.html"></section>
        <section data-external="sections/docker-networking.html"></section>
        <section data-external="sections/docker-volumes.html"></section>
        <section data-external="sections/docker-compose.html"></section>
        <section data-external="sections/devops-docker.html"></section>
        <section data-external="sections/docker-swarm.html"></section>
        <section data-external="sections/serverless.html"></section>
        <section data-external="sections/docker-kubernetes.html"></section>
        <section data-external="sections/monitoring.html"></section>
        <section data-external="sections/resources.html"></section>
        <section class="section-title" aria-label="Thank You closing slide"><h2>Thank You!</h2></section>
      </div>
    </div>

    <script src="dist/reveal.js"></script>
    <script src="plugin/notes/notes.js"></script>
    <script src="plugin/markdown/markdown.js"></script>
    <script src="plugin/highlight/highlight.js"></script>
    <script src="portrait.js"></script>
    <script>
      // More info about initialization & config:
      // - https://revealjs.com/initialization/
      // - https://revealjs.com/config/
      var dims = portraitSetup();

      Reveal.initialize({
        hash: true,
        slideNumber: "h/v",
        width: dims.width,
        height: dims.height,

        // Learn about plugins: https://revealjs.com/plugins/
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
        dependencies: [
          {
            src: "plugin/external/external.js",
            condition: function () {
              return !!document.querySelector(
                "[data-external],[data-external-replace]"
              );
            },
          },
        ],
      });
    </script>
  </body>
</html>
